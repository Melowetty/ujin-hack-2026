openapi: "3.0.3"
info:
  title: Тест апи
  description: REST API демо-сервиса
  version: "1.0.0"

servers:
  - url: /api/v1
    description: Локальный сервер

tags:
  - name: Users
    description: Управление пользователями

paths:

  /users:

    get:
      tags: [Users]
      summary: Список пользователей
      operationId: getUsers
      parameters:
        - name: page
          in: query
          description: Номер страницы (с 0)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Размер страницы
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: search
          in: query
          description: Поиск по имени или email
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Постраничный список пользователей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"

    post:
      tags: [Users]
      summary: Создать пользователя
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email уже занят
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:

    get:
      tags: [Users]
      summary: Получить пользователя по ID
      operationId: getUserById
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Users]
      summary: Обновить пользователя (частично)
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Пользователь обновлён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Users]
      summary: Удалить пользователя
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Успешно удалён
        "404":
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:

  parameters:
    UserId:
      name: id
      in: path
      required: true
      description: ID пользователя
      schema:
        type: integer
        format: int64

  schemas:

    UserRole:
      type: string
      enum: [ADMIN, USER, MODERATOR]
      description: Роль пользователя в системе

    UserResponse:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Иван Иванов"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: "Иван Иванов"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        role:
          $ref: "#/components/schemas/UserRole"

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: "Иван Иванов"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        role:
          $ref: "#/components/schemas/UserRole"

    UserPage:
      type: object
      required: [content, totalElements, totalPages, page, size]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
        totalElements:
          type: integer
          format: int64
          example: 42
        totalPages:
          type: integer
          example: 3
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "USER_NOT_FOUND"
        message:
          type: string
          example: "Пользователь с id 1 не найден"
        details:
          type: array
          nullable: true
          items:
            type: string
