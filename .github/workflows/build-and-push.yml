name: Build & Push to Docker Hub

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: melowetty/smart-display

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Spring Boot build layers
        uses: actions/cache@v4
        with:
          path: build/buildpacks-cache
          key: ${{ runner.os }}-buildpacks-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-buildpacks-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: melowetty
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image with Spring Boot Buildpacks
        run: |
          ./gradlew bootBuildImage \
            --imageName=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -x test \
            --no-daemon

      - name: Push image (commit SHA tag)
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Tag and push latest
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Service deploying
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd backend
            sudo docker pull ${{env.IMAGE_NAME}}
            sudo docker compose up -d